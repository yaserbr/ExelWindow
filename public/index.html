<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>4B Release Production Verification</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="app-shell">
    <header class="page-header">
      <h1>4B Release Production Verification</h1>
    </header>

    <div id="messageBox" class="message-box" role="status" aria-live="polite"></div>

    <main>
      <section id="loadingState" class="state-panel">
        <div class="loader"></div>
        <p>Loading data...</p>
      </section>

      <section id="emptyState" class="state-panel hidden">
        <h2>No data yet</h2>
        <p>Upload an Excel file to generate the dashboard.</p>
      </section>

      <div id="dashboardContent" class="hidden">
        <section id="firstSheetPanel" class="panel first-sheet-panel hidden">
          <div class="summary-heading">
            <h2 id="firstSheetTitle"></h2>
            <p id="lastUpdateTime" class="last-update-time"></p>
          </div>
          <div id="firstSheetTables" class="first-sheet-tables"></div>
        </section>

        <section class="panel">
          <div class="section-heading">
            <h2>Sheets</h2>
          </div>
          <div id="sheetTabs" class="sheet-tabs" role="tablist" aria-label="Excel sheets"></div>
        </section>

        <section class="panel">
          <div class="section-heading">
            <h2>Columns</h2>
          </div>
          <div id="columnsList" class="columns-list"></div>
        </section>

        <section id="selectedColumnPanel" class="panel hidden">
          <div class="section-heading">
            <h2 id="selectedColumnTitle">Column</h2>
          </div>
          <div id="selectedColumnStats" class="stats-grid"></div>
          <div id="chartsGrid" class="charts-grid">
            <article class="chart-card">
              <h3 id="barChartTitle">Chart</h3>
              <canvas id="barChartCanvas"></canvas>
            </article>
            <article class="chart-card">
              <h3 id="doughnutChartTitle">Share</h3>
              <canvas id="doughnutChartCanvas"></canvas>
            </article>
          </div>
        </section>

        <footer class="page-footer">
          <button id="openUploadModal" class="upload-link-button" type="button" aria-label="Upload New Excel">
            <span aria-hidden="true">+</span>
            Upload New Excel
          </button>
        </footer>
      </div>
    </main>
  </div>

  <div id="uploadModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="uploadTitle">
    <div class="modal-backdrop" data-close-modal></div>
    <form id="uploadForm" class="modal-card">
      <div class="modal-header">
        <h2 id="uploadTitle">Upload New Excel</h2>
        <button class="close-button" type="button" aria-label="Close" data-close-modal>&times;</button>
      </div>

      <label>
        <span>Excel file</span>
        <input id="excelFile" type="file" accept=".xlsx,.xls" required>
      </label>

      <p class="muted-text">Uploading a new Excel file will overwrite the current data.</p>

      <div id="uploadStatus" class="upload-status" role="status" aria-live="polite"></div>

      <div class="modal-actions">
        <button class="secondary-button" type="button" data-close-modal>Cancel</button>
        <button id="uploadButton" class="primary-button" type="submit">Upload and Replace</button>
      </div>
    </form>
  </div>

  <script src="/vendor/chart.js/chart.umd.js"></script>
  <script src="/app.js"></script>
</body>
</html>
